<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo app</title>
    <link rel="stylesheet" href="./styles.css">
    <script defer src="./script.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>To Do Lista</h1>
            <hr>
        </header>
        <main>
            <section id="feladat-hozzaadas">
                <h2>Új feladat</h2>
                <input type="text" id="uj-feladat-input" placeholder="Írd be a feladatot..."><br>
                <button id="hozzaadas-btn">Hozzáadás</button>
            </section>

            <hr>

            <section id="aktiv-feladatok">
                <h2 class="aktiv-feladatok">Aktív Feladatok</h2>
                <ul id="aktiv-lista">
                    <li class="feladat-elem">
                        <span class="feladat-szoveg">Bevásárlás</span>
                        <div class="gombok">
                            <button class="kesz-btn">Kész</button>
                            <button class="torles-btn">Törlés</button>
                        </div>
                    </li>
                    <li class="feladat-elem">
                        <span class="feladat-szoveg">Tanulás</span>
                        <div class="gombok">
                            <button class="kesz-btn">Kész</button>
                            <button class="torles-btn">Törlés</button>
                        </div>
                    </li>
                    <li class="feladat-elem">
                        <span class="feladat-szoveg">Takarítás</span>
                        <div class="gombok">
                            <button class="kesz-btn">Kész</button>
                            <button class="torles-btn">Törlés</button>
                        </div>
                    </li>
                </ul>
            </section>

            <section id="kesz-feladatok">
                <h2>Elkészült Feladatok</h2>
                <ul id="kesz-lista">
                </ul>
            </section>
            <hr>
            <section id="torolt-feladatok">
                <h2>Törölt Feladatok</h2>
                <ul id="torolt-lista">
                    <span class="feladat-szoveg">Szemét kivitele</span> <!-- ez csak tesztnek raktam be hogy megnezem a css kinezetet -->
                </ul>
            </section>
        </main>
        <hr>
        <footer> 
            <p>A teendők lokálisan mentődnek.</p>
            <p class="sshh">Az oldalt fenttartja: Bassam Teli Asad BT.</p> 
        </footer>
    </div>
</body>
</html>
